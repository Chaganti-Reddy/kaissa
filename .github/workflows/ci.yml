name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Kaissa.sln

      - name: Build (net9 + netstandard2.1)
        run: dotnet build Kaissa.sln -c Release --no-restore

      - name: Test
        run: dotnet test Kaissa.sln -c Release --no-build
