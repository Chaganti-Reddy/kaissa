name: Release

# Builds the Windows desktop app and attaches it to a GitHub Release when a version tag is pushed.
# Runs on a SELF-HOSTED Windows runner that has the Unity editor (activated) and the .NET SDK
# installed — this avoids Unity's licensing restrictions on hosted runners. See docs/release.md.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 90
    env:
      UNITY: 'C:\Program Files\Unity\Hub\Editor\6000.5.1f1\Editor\Unity.exe'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Stage engine + core plugins
        shell: powershell
        run: |
          ./scripts/fetch-stockfish.ps1
          ./scripts/build-unity-plugins.ps1

      - name: Build (Windows 64-bit)
        shell: powershell
        run: |
          $buildDir = "$env:GITHUB_WORKSPACE\build"
          $out  = "$buildDir\Kaissa\Kaissa.exe"
          $log  = "$env:GITHUB_WORKSPACE\unity-build.log"
          $lock = "$env:GITHUB_WORKSPACE\client\Temp\UnityLockfile"
          $ok = $false
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "===== Unity build attempt $i ====="
            Get-Process -Name Unity -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
            if (Test-Path "$lock")     { Remove-Item "$lock" -Force -ErrorAction SilentlyContinue }
            # Wipe the whole output dir, not just the exe — Unity does an incremental player build and
            # will skip re-emitting the exe if the *_Data folder still looks up to date.
            if (Test-Path "$buildDir") { Remove-Item "$buildDir" -Recurse -Force -ErrorAction SilentlyContinue }
            # Unity.exe forks its launcher, so `&` doesn't wait. Start-Process -Wait waits for the
            # real build to finish. Its exit code is unreliable, so treat a produced exe as success.
            $p = Start-Process -FilePath "$env:UNITY" -Wait -PassThru -NoNewWindow -ArgumentList @(
              '-batchmode','-quit','-projectPath','client',
              '-buildWindows64Player',"$out",'-logFile',"$log")
            if (Test-Path "$out") { $ok = $true; break }
            Write-Host "Attempt $i failed (exit $($p.ExitCode)). Log tail:"
            if (Test-Path "$log") { Get-Content "$log" -Tail 40 }
          }
          Get-Process -Name Unity -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          if (-not $ok) { throw "Unity build failed after retries" }

      - name: Prune debug symbols
        shell: powershell
        run: |
          # Unity emits *_BurstDebugInformation_DoNotShip next to the player; not for release.
          Get-ChildItem "$env:GITHUB_WORKSPACE\build\Kaissa" -Directory -Filter '*_DoNotShip' -ErrorAction SilentlyContinue |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

      - name: Zip
        shell: powershell
        run: Compress-Archive -Path "$env:GITHUB_WORKSPACE\build\Kaissa\*" -DestinationPath "$env:GITHUB_WORKSPACE\Kaissa-Windows-${{ github.ref_name }}.zip" -Force

      - name: Build installer (Inno Setup)
        shell: powershell
        run: |
          $iscc = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { $iscc = (Get-Command iscc -ErrorAction SilentlyContinue).Source }
          if (-not $iscc) {
            Write-Warning "Inno Setup not found; skipping installer. Zip is still published."
            exit 0
          }
          & "$iscc" "/DMyAppVersion=${{ github.ref_name }}" "installer\kaissa.iss"
          if ($LASTEXITCODE -ne 0) { throw "Installer build failed ($LASTEXITCODE)" }
          Get-ChildItem "$env:GITHUB_WORKSPACE\installer-out" | Format-Table -AutoSize

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Kaissa-Windows-${{ github.ref_name }}.zip
            installer-out/Kaissa-Setup-${{ github.ref_name }}.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
