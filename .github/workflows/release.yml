name: Release

# Builds the Windows desktop app and attaches it to a GitHub Release when a version tag is pushed.
# Runs on a SELF-HOSTED Windows runner that has the Unity editor (activated) and the .NET SDK
# installed — this avoids Unity's licensing restrictions on hosted runners. See docs/release.md.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: [self-hosted, Windows]
    env:
      UNITY: 'C:\Program Files\Unity\Hub\Editor\6000.5.1f1\Editor\Unity.exe'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Stage engine + core plugins
        shell: powershell
        run: |
          ./scripts/fetch-stockfish.ps1
          ./scripts/build-unity-plugins.ps1

      - name: Build (Windows 64-bit)
        shell: powershell
        run: |
          $out = "$env:GITHUB_WORKSPACE\build\Kaissa\Kaissa.exe"
          $log = "$env:GITHUB_WORKSPACE\unity-build.log"
          $ok = $false
          for ($i = 1; $i -le 4; $i++) {
            Write-Host "===== Unity build attempt $i ====="
            if (Test-Path "$out") { Remove-Item "$out" -Force }
            & "$env:UNITY" -batchmode -quit -projectPath "client" -buildWindows64Player "$out" -logFile "$log"
            $code = $LASTEXITCODE
            if ($code -eq 0 -and (Test-Path "$out")) { $ok = $true; break }
            Write-Host "Attempt $i failed (exit $code). Log tail:"
            if (Test-Path "$log") { Get-Content "$log" -Tail 40 }
            Start-Sleep -Seconds 8
          }
          if (-not $ok) { throw "Unity build failed after retries" }

      - name: Zip
        shell: powershell
        run: Compress-Archive -Path "$env:GITHUB_WORKSPACE\build\Kaissa\*" -DestinationPath "$env:GITHUB_WORKSPACE\Kaissa-Windows-${{ github.ref_name }}.zip" -Force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: Kaissa-Windows-${{ github.ref_name }}.zip
          generate_release_notes: true
