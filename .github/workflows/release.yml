name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Stockfish (Windows)
        run: |
          mkdir -p client/Assets/StreamingAssets/stockfish
          curl -fsSL -o sf.zip https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-windows-x86-64.zip
          unzip -o sf.zip
          cp stockfish/stockfish-windows-x86-64.exe client/Assets/StreamingAssets/stockfish/stockfish.exe

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: client/Library
          key: Library-${{ hashFiles('client/Assets/**', 'client/Packages/**', 'client/ProjectSettings/**') }}
          restore-keys: Library-

      - name: Build (Windows 64-bit)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: client
          targetPlatform: StandaloneWindows64
          buildName: Kaissa

      - name: Zip build
        run: cd build && zip -r ../Kaissa-Windows-${{ github.ref_name }}.zip StandaloneWindows64

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: Kaissa-Windows-${{ github.ref_name }}.zip
          generate_release_notes: true
